<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>web page design</title>
        <link rel="stylesheet" href="styles/webpage.css" />
    </head>
    <body>
        <header>
            <div id="head">
                <div>
                    <p class="logo-style">LOGO</p>
                </div>
                <div>
                    <button class="button-style">Sign Up</button>
                </div>
            </div>
            <div class="head2">
                <div>
                    <p class="head2-title">
                        Cool Dark UI Template for Webflow Agencies!
                    </p>
                </div>
                <div>
                    <button class="head2-button-style">Stay Focused</button>
                </div>
            </div>
        </header>
        <main>
            <section id="card-one">
                <div class="card-design">
                    <div class="card-style1">
                        <h3 class="card-design-title">See It in Action</h3>
                        <p class="card-design-description">
                            Explore the live preview and imagine your brand in
                            this bold new look.
                        </p>
                        <button class="card-design-button">
                            Launch Live Preview
                        </button>
                    </div>
                    <div class="card-style2">
                        <img src="images/wc-mini.png" alt="" />
                    </div>
                </div>
            </section>
        </main>
        <footer></footer>
    </body>
</html>
